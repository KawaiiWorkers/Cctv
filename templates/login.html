<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login · CCTV</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#e2e8f0}
  .card{background:rgba(30,41,59,.7);backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,.2);padding:2.5rem;border-radius:16px;width:100%;max-width:380px;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
  h1{font-size:1.5rem;margin-bottom:.5rem;text-align:center}
  p.sub{color:#94a3b8;text-align:center;margin-bottom:1.8rem;font-size:.9rem}
  label{display:block;font-size:.85rem;color:#cbd5e1;margin-bottom:.4rem}
  input{width:100%;padding:.8rem 1rem;background:rgba(15,23,42,.6);border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:.95rem;margin-bottom:1rem;outline:none;transition:.2s}
  input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.2)}
  button{width:100%;padding:.85rem;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:8px;color:#fff;font-weight:600;font-size:1rem;cursor:pointer;transition:.2s}
  button:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(99,102,241,.4)}
  .err{color:#f87171;text-align:center;margin-bottom:1rem;font-size:.85rem}
</style>
</head>
<body>
  <div class="card">
    <h1>🎥 Surveillance Admin</h1>
    <p class="sub">Sign in to access the dashboard</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="POST">
      <label>Username</label>
      <input type="text" name="username" autocomplete="username" required autofocus>
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
      <button type="submit">Sign In →</button>
    </form>
  </div>
</body>
</html>
