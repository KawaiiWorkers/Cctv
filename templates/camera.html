<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CCTV Camera</title>
<style>
  body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  video { flex: 1; object-fit: cover; width: 100%; }
  .bar { background: #1a1f2b; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10;}
  button { padding: 12px 24px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
  #startBtn { background: #093; color: #fff; }
  #stopBtn { background: #f55; color: #fff; display: none; }
  .status { font-size: 14px; color: #aaa; }
  #recIndicator { color: #f55; font-weight: bold; display: none; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="bar">
  <div>
    <b>Camera <span id="camId"></span></b><br>
    <span class="status" id="status">Waiting to start...</span>
    <span id="recIndicator">● REC</span>
  </div>
  <button id="startBtn">Start Camera</button>
  <button id="stopBtn">Stop</button>
</div>

<video id="vid" autoplay playsinline muted></video>

<script>
// --- Configuration ---
// Adjust this to change how often videos save to Supabase (in minutes)
const CHUNK_MINUTES = 0.25; 
let camId = "Phone-" + Math.floor(Math.random()*1000);
document.getElementById("camId").textContent = camId;

let stream = null;
let recorder = null;
let rtcPeer = null;
let sigPoll = null;

const vid = document.getElementById("vid");
const status = document.getElementById("status");
const recIndicator = document.getElementById("recIndicator");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

startBtn.onclick = async () => {
    try {
        // 🔥 BOOSTED RESOLUTION: 1920x1080 Full HD
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { ideal: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } },
            audio: true
        });
        vid.srcObject = stream;
        
        startBtn.style.display = "none";
        stopBtn.style.display = "block";
        status.textContent = "Online & Streaming";
        recIndicator.style.display = "inline";

        // 1. Start continuous background recording for Supabase
        startRecordingLoop();

        // 2. Register camera with server so dashboard sees it
        await fetch("/api/register_camera", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id: camId, name: camId })
        });

        // 3. Keep updating "last seen" and check for WebRTC requests
        sigPoll = setInterval(pollSignaling, 2000);

    } catch (e) {
        alert("Camera error: " + e.message);
    }
};

stopBtn.onclick = () => {
    if(recorder && recorder.state === "recording") recorder.stop();
    if(stream) stream.getTracks().forEach(t => t.stop());
    if(rtcPeer) rtcPeer.close();
    if(sigPoll) clearInterval(sigPoll);
    
    startBtn.style.display = "block";
    stopBtn.style.display = "none";
    status.textContent = "Stopped";
    recIndicator.style.display = "none";
    vid.srcObject = null;
};

// --- Recording & Upload Logic ---
function startRecordingLoop() {
    if (!stream) return;
    let chunks = [];
    const mime = MediaRecorder.isTypeSupported("video/webm;codecs=vp8,opus") ? "video/webm;codecs=vp8,opus" : "video/webm";
    
    // 🔥 BOOSTED BITRATE: 2,500_000 (2.5 Mbps) for high quality HD footage
    recorder = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 2500000 });
    
    recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    
    recorder.onstop = async () => {
        if (chunks.length === 0) return;
        const blob = new Blob(chunks, { type: mime });
        chunks = []; // clear
        
        // Upload to server -> Supabase
        const fd = new FormData();
        fd.append("video", blob, `cam_${camId}_${Date.now()}.webm`);
        try {
            status.textContent = "Uploading chunk...";
            await fetch("/upload_chunk", { method: "POST", body: fd });
            status.textContent = "Online & Streaming";
        } catch (err) {
            console.error("Upload failed", err);
            status.textContent = "Upload Error!";
        }
        
        // If still streaming, restart recorder immediately
        if (stream && stream.active && stopBtn.style.display === "block") {
            startRecordingLoop();
        }
    };

    recorder.start();
    // Stop and trigger upload after CHUNK_MINUTES
    setTimeout(() => {
        if (recorder.state === "recording") recorder.stop();
    }, CHUNK_MINUTES * 60 * 1000);
}

// --- WebRTC Zero-Lag Streaming Logic ---
async function pollSignaling() {
    // Keep camera alive on backend
    fetch(`/api/ping?id=${camId}`);

    // Check if Admin Dashboard wants to view this camera
    const r = await fetch(`/webrtc/${camId}/offer`);
    const offer = await r.json();
    
    if (offer && (!rtcPeer || rtcPeer.signalingState === "closed")) {
        console.log("Admin requesting HD stream...");
        rtcPeer = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
        
        stream.getTracks().forEach(t => rtcPeer.addTrack(t, stream));

        rtcPeer.onicecandidate = e => {
            if (e.candidate) {
                fetch(`/webrtc/${camId}/cam_ice`, { method: "POST", body: JSON.stringify(e.candidate) });
            }
        };

        await rtcPeer.setRemoteDescription(new RTCSessionDescription(offer));
        const ans = await rtcPeer.createAnswer();
        await rtcPeer.setLocalDescription(ans);
        
        await fetch(`/webrtc/${camId}/answer`, { method: "POST", body: JSON.stringify(rtcPeer.localDescription) });

        // Clear old offer on server
        fetch(`/webrtc/${camId}/offer`, { method: "DELETE" });

        // Check for ICE candidates from Admin
        const iceInt = setInterval(async () => {
            if (rtcPeer.signalingState === "closed") { clearInterval(iceInt); return; }
            const rr = await fetch(`/webrtc/${camId}/admin_ice`);
            const cands = await rr.json();
            cands.forEach(c => rtcPeer.addIceCandidate(new RTCIceCandidate(c)));
        }, 2000);
    }
}
</script>
</body>
</html>
