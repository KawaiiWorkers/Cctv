<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Footage</title>
<style>
  body{margin:0;font-family:sans-serif;background:#0d0f14;color:#eee}
  header{background:#1a1f2b;padding:14px 22px;display:flex;justify-content:space-between;align-items:center}
  header h1{margin:0;font-size:18px}
  header a{color:#4af;text-decoration:none;margin-left:16px}
  main{padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:900px){main{grid-template-columns:1fr}}
  table{width:100%;border-collapse:collapse;background:#1a1f2b;border-radius:8px;overflow:hidden}
  th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #2a2f3b;font-size:14px}
  tr:hover{background:#222836;cursor:pointer}
  video{width:100%;background:#000;border-radius:8px}
  .empty{opacity:.6;padding:20px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>🎞 Supabase Footage</h1>
  <div>
    <a href="/dashboard">Live</a>
    <a href="/footage">Footage</a>
    <a href="/logout">Logout</a>
  </div>
</header>

<main>
  <div>
    {% if files %}
    <table>
      <thead><tr><th>File</th><th>Date / Time</th><th>Size</th></tr></thead>
      <tbody>
        {% for f in files %}
        <tr onclick="play('{{ f.name }}')">
          <td style="word-break: break-all;">{{ f.name }}</td>
          <td>{{ f.modified }}</td>
          <td>{{ f.size_mb }} MB</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    {% else %}
      <div class="empty">No footage yet. Supabase recordings appear here every 10 minutes.</div>
    {% endif %}
  </div>

  <div>
    <video id="player" controls autoplay></video>
    <p id="now" style="opacity:.7">Click any row to stream from Supabase.</p>
    <a id="dl" style="color:#4af; display: none;" target="_blank">⬇ Download</a>
  </div>
</main>

<script>
function play(name) {
  const p = document.getElementById("player");
  const secureUrl = "/footage/" + encodeURIComponent(name);
  p.src = secureUrl;
  p.play();
  document.getElementById("now").textContent = "Now streaming: " + name;
  const dl = document.getElementById("dl");
  dl.href = secureUrl;
  dl.style.display = "inline-block";
  dl.textContent = "⬇ Download " + name;
}
</script>
</body>
</html>
